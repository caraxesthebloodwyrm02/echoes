repos:
  # Linting and formatting
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.7.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix, --show-fixes]
        types_or: [python, pyi, jupyter]
      - id: ruff-format

  # Basic Python checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: debug-statements
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-case-conflict
      - id: check-docstring-first

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: [-r, ., -f, json, -o, bandit-report.json]
        pass_filenames: false
        additional_dependencies: ["bandit[toml]"]

  # Dependency security: pyupio/safety does NOT publish a .pre-commit-hooks.yaml
  # in its release tags, so it can never be wired up as a pre-commit hook.
  # `python-safety-dependencies-check` from Lucas-C/pre-commit-hooks-safety
  # (configured below) covers the same use case correctly. Run the standalone
  # `safety` CLI in CI if richer reports are needed.

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint
        args: [--ignore, DL3008, --ignore, DL3009]

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-d, relaxed]

  # Lock file checking: the python-safety-dependencies-check hook does not
  # support a mix of pyproject.toml and requirements.txt in the same invocation
  # (see https://github.com/Lucas-C/pre-commit-hooks-safety) and this repo has
  # both, so the hook always fails with "Unsupported mix of pyproject.toml &
  # requirements files". Run `safety check` (or `pip-audit`) directly in CI for
  # dependency vulnerability scanning instead.

# Configuration
default_language_version:
  python: python3.12

fail_fast: false
minimum_pre_commit_version: "3.0.0"

# CI configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false
