version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
      - "automated"
    commit-message:
      prefix: "deps(python)"
      include: "scope"
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy*"
          - "pre-commit"
          - "coverage"
        update-types:
          - "minor"
          - "patch"
      fastapi-ecosystem:
        patterns:
          - "fastapi*"
          - "uvicorn*"
          - "starlette*"
          - "pydantic*"
        update-types:
          - "minor"
          - "patch"
      langchain-ecosystem:
        patterns:
          - "langchain*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "pydantic"
        update-types: ["version-update:semver-major"]
      - dependency-name: "fastapi"
        update-types: ["version-update:semver-major"]
      # langchain ecosystem must move together across the 1.0 boundary.
      # See docs/incidents/submit-pypi-2026-04-29.md for the full rationale.
      # Dependabot treats 0.x bumps as "minor", which is how PR #200 (langchain-core
      # 0.3.x -> 1.3.x) merged and broke the submit-pypi resolver. Block 1.x bumps
      # for every package in the ecosystem until the langchain-classic migration is
      # done; then bump them all in one coordinated PR.
      - dependency-name: "langchain"
        versions: [">=1.0.0"]
      - dependency-name: "langchain-core"
        versions: [">=1.0.0"]
      - dependency-name: "langchain-community"
        versions: [">=0.4.0"]
      - dependency-name: "langchain-openai"
        versions: [">=1.0.0"]
      - dependency-name: "langchain-text-splitters"
        versions: [">=1.0.0"]
      - dependency-name: "langchain-classic"
        versions: [">=1.0.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "ci(actions)"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
