[tox]
envlist = py312, py313
skip_missing_interpreters = true

[testenv]
deps =
    pytest>=8.0.0
    pytest-cov>=4.0.0
    pytest-asyncio>=0.21.0
    ruff>=0.1.0

commands =
    pip install -e .
    ruff check api/ app/ glimpse/ tools/
    pytest tests/ -v --tb=short -q

[testenv:py312]
basepython = python3.12

[testenv:py313]
basepython = python3.13
