# Redis configuration for resilience patterns
# Save as redis.conf in project root
#
# SECURITY: bind 0.0.0.0 exposes Redis to all interfaces. For production,
# use bind 127.0.0.1 or restrict to a private network interface and
# protect with firewall rules. Require REDIS_PASSWORD when not localhost.

# Basic settings
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 300

# Persistence (for rate limit state persistence)
save 900 1
save 300 10
save 60 10000

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command SHUTDOWN SHUTDOWN_REDIS
rename-command CONFIG CONFIG_REDIS

# Slowlog for monitoring
slowlog-log-slower-than 10000
slowlog-max-len 128

# Disable AOF for better performance (RDB is sufficient for rate limiting)
appendonly no

# Enable Redis Cluster if scaling beyond single instance
# cluster-enabled yes
# cluster-config-file nodes.conf
# cluster-node-timeout 5000
